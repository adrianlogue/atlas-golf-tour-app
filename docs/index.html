<style>
  :root {
    --ui: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'SF Pro Display', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    --serif: 'Source Serif 4', Georgia, 'Times New Roman', serif;

    --ink: #0B2440;          /* deep Atlantic navy chrome */
    --ink-700: #123055;
    --brand: #10457F;        /* primary — brand blue */
    --brand-600: #1A5CA3;
    --brand-tint: #E3EBF5;
    --brand-tint-2: #CFDEEE;
    --cream: #F6F3EB;        /* warm app surface */
    --cream-2: #F0EBDF;
    --card: #FFFFFF;
    --text: #16201A;
    --muted: #5B6962;
    --muted-2: #8C968E;
    --border: #E7E2D6;
    --border-strong: #D9D3C4;
    --divider: #EFEBE0;
    --gold: #C39A4E;
    --gold-deep: #9F7C32;
    --gold-tint: #F4EAD4;

    --under: #0B7A3B;        /* under par / position up */
    --over: #C2462F;         /* over par / position down */
    --even: #2A3630;
    --live: #D6332A;

    --r-sm: 8px; --r-md: 12px; --r-lg: 18px; --r-xl: 26px;
    --shadow-card: 0 1px 2px rgba(20,30,22,.04), 0 6px 18px rgba(20,30,22,.06);
    --shadow-float: 0 10px 40px rgba(7,25,45,.18);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: var(--ui);
    background:
      radial-gradient(120% 80% at 50% -10%, #0d3a66 0%, #0a2c50 55%, #071f3a 100%);
    color: var(--text);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ---------- Presentation stage ---------- */
  #stage {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
  }
  #scaler { transform-origin: center center; }

  .phone {
    position: relative;
    width: 393px; height: 852px;
    background: #000;
    border-radius: 56px;
    padding: 5px;
    box-shadow:
      0 0 0 5px #15140f,
      0 0 0 7px #2c2a20,
      var(--shadow-float),
      0 40px 90px rgba(0,0,0,.45);
  }
  .phone-screen {
    position: relative;
    width: 100%; height: 100%;
    background: var(--cream);
    border-radius: 51px;
    overflow: hidden;
  }

  /* Dynamic island */
  .island {
    position: absolute; top: 11px; left: 50%; transform: translateX(-50%);
    width: 124px; height: 36px; background: #000; border-radius: 20px;
    z-index: 1200; pointer-events: none;
  }

  /* status bar */
  .statusbar {
    position: absolute; top: 0; left: 0; right: 0; height: 54px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 30px 0; z-index: 900; pointer-events: none;
    font-weight: 600; font-size: 15px; letter-spacing: .2px;
  }
  .statusbar .sb-right { display: flex; align-items: center; gap: 7px; }

  /* app root area */
  .app-root { position: absolute; inset: 0; overflow: hidden; }

  /* nav layers */
  .nav-layer {
    position: absolute; inset: 0;
    background: var(--cream);
    display: flex; flex-direction: column;
    will-change: transform;
  }
  .nav-layer.push-enter { transform: translateX(100%); }
  .nav-layer.push-enter-active { transform: translateX(0); transition: transform .34s cubic-bezier(.32,.72,0,1); }
  .nav-layer.push-exit { transform: translateX(0); }
  .nav-layer.push-exit-active { transform: translateX(100%); transition: transform .3s cubic-bezier(.32,.72,0,1); }

  .scroll {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior: contain;
  }
  .scroll::-webkit-scrollbar { width: 0; height: 0; }

  /* generic */
  .card {
    background: var(--card); border-radius: var(--r-lg);
    box-shadow: var(--shadow-card); border: 1px solid var(--border);
  }
  .row-press { cursor: pointer; transition: background .12s; }
  .row-press:active { background: var(--cream-2); }

  .tabbar {
    position: absolute; left: 0; right: 0; bottom: 0; z-index: 800;
    height: 86px; padding-bottom: 22px;
    background: rgba(246,243,235,.86);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border-top: 1px solid var(--border);
    display: flex;
  }
  .tab {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 4px; cursor: pointer; color: var(--muted-2);
    font-size: 10.5px; font-weight: 600; letter-spacing: .1px;
    transition: color .15s;
  }
  .tab.active { color: var(--brand); }

  .home-indicator {
    position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
    width: 134px; height: 5px; border-radius: 3px; background: #16201A; opacity: .9;
    z-index: 1000; pointer-events: none;
  }

  /* sheets */
  .sheet-scrim {
    position: absolute; inset: 0; z-index: 1000;
    background: rgba(6,18,32,0); transition: background .3s;
  }
  .sheet-scrim.show { background: rgba(6,18,32,.5); }
  .sheet {
    position: absolute; left: 0; right: 0; bottom: 0; z-index: 1001;
    background: var(--cream); border-radius: 26px 26px 0 0;
    transform: translateY(100%); transition: transform .42s cubic-bezier(.32,.72,0,1);
    box-shadow: 0 -10px 40px rgba(0,0,0,.2);
    max-height: 92%; display: flex; flex-direction: column;
  }
  .sheet.show { transform: translateY(0); }
  .sheet-handle { width: 38px; height: 5px; border-radius: 3px; background: var(--border-strong); margin: 10px auto 4px; flex: 0 0 auto; }

  .toast {
    position: absolute; left: 16px; right: 16px; bottom: 104px; z-index: 1300;
    background: var(--ink); color: #fff; border-radius: 14px;
    padding: 13px 16px; font-size: 13.5px; font-weight: 500;
    box-shadow: var(--shadow-float);
    opacity: 0; transform: translateY(10px); transition: opacity .25s, transform .25s;
    display: flex; align-items: center; gap: 10px;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* spinner ring (pull to refresh) */
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes shimmer { 0% { background-position: -200px 0; } 100% { background-position: 200px 0; } }
  .skel {
    background: linear-gradient(90deg, #eceae1 25%, #f4f2ea 37%, #eceae1 63%);
    background-size: 400px 100%; animation: shimmer 1.3s infinite linear;
    border-radius: 6px;
  }

  @keyframes fadeUp { from { transform: translateY(10px); } to { transform: translateY(0); } }
  .fade-up { animation: fadeUp .42s cubic-bezier(.32,.72,0,1) both; }

  /* hero image placeholder */
  .img-ph {
    background-color: #16324e;
    background-image:
      repeating-linear-gradient(135deg, rgba(255,255,255,.05) 0 10px, rgba(255,255,255,0) 10px 20px);
    color: rgba(255,255,255,.5); font-family: ui-monospace, 'SF Mono', Menlo, monospace;
    font-size: 11px; letter-spacing: .5px;
    display: flex; align-items: center; justify-content: center; text-align: center;
  }

  /* ---------- Control rail (prototype scaffolding) ---------- */
  #rail {
    position: fixed; left: 50%; bottom: 22px; transform: translateX(-50%);
    z-index: 50; display: flex; gap: 6px; align-items: center;
    background: rgba(6,22,40,.7); backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,.14); border-radius: 999px;
    padding: 7px 8px; box-shadow: var(--shadow-float);
    transition: opacity .3s, transform .3s;
  }
  #rail.hidden { opacity: 0; transform: translateX(-50%) translateY(20px); pointer-events: none; }
  .rail-btn {

  html { touch-action: manipulation; }

  input, textarea { -webkit-user-select: text; user-select: text; }

  #frame { position: fixed; inset: 0; background: var(--cream); overflow: hidden; }

  /* Prototype scaffolding (screen-jump rail, overlays) stays wired but hidden.
     Append ?controls to the URL to bring it back. */
  body:not(.show-controls) #rail,
  body:not(.show-controls) #railShow,
  body:not(.show-controls) #jump { display: none !important; }

  /* Wide screens: a plain phone-sized column, no bezel. */
  @media (min-width: 560px) and (min-height: 700px) {
    #frame {
      inset: auto; position: fixed; left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      width: 393px; height: min(852px, calc(100dvh - 48px));
      border-radius: 28px; border: 1px solid rgba(20, 30, 22, .1);
      box-shadow: 0 24px 70px rgba(20, 30, 22, .22);
    }
  }

  /* Real devices: the phone provides the status bar and home indicator.
     iOS 26.1 letterboxes installed web apps top and bottom, painting the
     reserved strips with the page background — match it to the app surface
     so they read as part of the app. */
  @media (max-width: 559.98px), (max-height: 699.98px) {
    html, body { background: var(--cream); }
    .statusbar { display: none !important; }
    .tabbar {

    .toast { bottom: calc(82px + max(22px, env(safe-area-inset-bottom))); }
    .sheet { padding-bottom: env(safe-area-inset-bottom); }
  }
